function log(msg,cls=''){
  const el=document.getElementById('log');
  el.innerHTML+=`<span class="${cls}">${msg}\n</span>`;
  el.scrollTop=el.scrollHeight;
}

async function deploy(){
  const btn=document.getElementById('btn');
  btn.disabled=true; btn.textContent='上傳中...';
  document.getElementById('log').innerHTML='';
  log('🔄 連接 GitHub API...','info');
  try{
    // Check SHA
    let sha=null;
    const chk=await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`,{
      headers:{'Authorization':'token '+TOKEN,'Accept':'application/vnd.github.v3+json'}
    });
    if(chk.ok){ sha=(await chk.json()).sha; log('✓ 找到現有檔案','ok'); }
    else log('✓ 新檔案','ok');

    log('🔄 上傳 index.html (1898行)...','info');
    const body={message:'Deploy SMC PRO Terminal v1',content:CONTENT};
    if(sha) body.sha=sha;
    const res=await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`,{
      method:'PUT',
      headers:{'Authorization':'token '+TOKEN,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(res.ok){
      log('✅ 上傳成功！','ok');
      log('🔄 現在去開啟 GitHub Pages...','info');
      log('進入 Settings → Pages → main → Save','info');
      document.getElementById('urlBox').style.display='block';
    } else {
      const e=await res.json();
      log('❌ 失敗：'+JSON.stringify(e),'err');
    }
  }catch(e){log('❌ 錯誤：'+e.message,'err');}
  btn.disabled=false; btn.textContent='🚀 重試';
}
</script>
